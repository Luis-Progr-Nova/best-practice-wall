<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Best Practice Wall — Values4Success</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
@keyframes cardReveal{from{opacity:0;transform:translateY(24px) scale(0.96)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes glowPulse{0%,100%{opacity:0.15}50%{opacity:0.35}}
@keyframes barGrow{from{width:0}to{width:var(--bar-w)}}
:root{--bg-void:#050810;--bg-surface:#0c1224;--bg-card:#0f1630;--border-subtle:rgba(255,255,255,0.04);--border-light:rgba(255,255,255,0.07);--border-accent:rgba(6,214,160,0.12);--accent:#06d6a0;--accent-dim:rgba(6,214,160,0.08);--accent-gold:#f0b429;--text-bright:#f4f6fb;--text-primary:#e0e4ed;--text-sec:#7b86a0;--text-muted:#4a5370;--v-enth:#f43f5e;--v-enth-bg:rgba(244,63,94,0.08);--v-enth-glow:rgba(244,63,94,0.04);--v-exc:#3b82f6;--v-exc-bg:rgba(59,130,246,0.08);--v-exc-glow:rgba(59,130,246,0.04);--v-ts:#06d6a0;--v-ts-bg:rgba(6,214,160,0.08);--v-ts-glow:rgba(6,214,160,0.04);--v-int:#a78bfa;--v-int-bg:rgba(167,139,250,0.08);--v-int-glow:rgba(167,139,250,0.04);--v-ent:#f0b429;--v-ent-bg:rgba(240,180,41,0.08);--v-ent-glow:rgba(240,180,41,0.04);--v-res:#ec4899;--v-res-bg:rgba(236,72,153,0.08);--v-res-glow:rgba(236,72,153,0.04)}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg-void);color:var(--text-primary);font-family:'Inter',system-ui,sans-serif;min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased}
.atmo{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.atmo-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(6,214,160,0.018) 1px,transparent 1px),linear-gradient(90deg,rgba(6,214,160,0.018) 1px,transparent 1px);background-size:80px 80px;mask-image:radial-gradient(ellipse 70% 60% at 50% 40%,black 20%,transparent 70%);-webkit-mask-image:radial-gradient(ellipse 70% 60% at 50% 40%,black 20%,transparent 70%)}
.orb{position:absolute;border-radius:50%;filter:blur(80px)}
.orb.a{width:700px;height:700px;top:-250px;right:-150px;background:radial-gradient(circle,rgba(6,214,160,0.06),transparent 65%);animation:glowPulse 8s ease-in-out infinite}
.orb.b{width:500px;height:500px;bottom:-100px;left:-100px;background:radial-gradient(circle,rgba(59,130,246,0.04),transparent 65%);animation:glowPulse 12s ease-in-out infinite 3s}
.orb.c{width:400px;height:400px;top:40%;left:50%;background:radial-gradient(circle,rgba(167,139,250,0.025),transparent 65%);animation:glowPulse 10s ease-in-out infinite 6s}
.vline{position:absolute;top:0;bottom:0;width:1px;background:linear-gradient(180deg,transparent,rgba(6,214,160,0.04) 30%,rgba(6,214,160,0.04) 70%,transparent)}
.vline:nth-child(4){left:25%}.vline:nth-child(5){left:50%}.vline:nth-child(6){left:75%}
.main{position:relative;z-index:1;max-width:1440px;margin:0 auto;padding:0 3rem;animation:fadeIn .6s ease}
.hdr{display:flex;align-items:center;justify-content:space-between;padding:2rem 0 1.5rem;border-bottom:1px solid var(--border-subtle)}
.hdr-l{display:flex;align-items:center;gap:2.5rem}
.logos{display:flex;align-items:center;gap:20px}
.lsvg{height:22px;opacity:.85;transition:opacity .3s}.lsvg:hover{opacity:1}
.lsep{width:1px;height:28px;background:linear-gradient(180deg,transparent,rgba(255,255,255,.1),transparent)}
.htitle{font-family:'Sora',sans-serif;font-size:24px;font-weight:600;letter-spacing:-.5px;color:var(--text-bright)}
.hsub{font-size:13px;color:var(--text-muted);margin-top:3px;letter-spacing:1.5px;text-transform:uppercase;font-weight:500}
.hdr-r{display:flex;align-items:center;gap:12px}
.btn-r{padding:10px 24px;border-radius:10px;background:linear-gradient(135deg,#06d6a0,#05b88a);color:var(--bg-void);font-family:'Sora',sans-serif;font-size:12px;font-weight:700;letter-spacing:1px;text-transform:uppercase;border:none;cursor:pointer;transition:all .25s cubic-bezier(.16,1,.3,1);box-shadow:0 4px 20px rgba(6,214,160,.2)}
.btn-r:hover{transform:translateY(-2px);box-shadow:0 6px 28px rgba(6,214,160,.3)}.btn-r:active{transform:translateY(0)}

/* View toggle */
.view-toggle{display:flex;gap:4px;background:var(--bg-surface);border:1px solid var(--border-subtle);border-radius:12px;padding:4px}
.vt-btn{padding:8px 20px;border-radius:9px;border:none;background:transparent;font-family:'Sora',sans-serif;font-size:12px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;color:var(--text-muted);cursor:pointer;transition:all .2s}
.vt-btn:hover{color:var(--text-sec)}
.vt-btn.on{background:var(--bg-card);color:var(--text-bright);box-shadow:0 2px 8px rgba(0,0,0,.2)}

.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;padding:2rem 0}
.st{padding:24px 28px;background:var(--bg-surface);border:1px solid var(--border-subtle);border-radius:16px;position:relative;overflow:hidden}
.st::after{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(6,214,160,.15),transparent)}
.st-n{font-family:'Sora',sans-serif;font-size:36px;font-weight:700;color:var(--text-bright);letter-spacing:-1px;line-height:1}
.st-l{font-size:11px;color:var(--text-muted);margin-top:8px;letter-spacing:1.5px;text-transform:uppercase;font-weight:600}
.frow{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.filters-area{padding-bottom:2rem;display:flex;flex-direction:column;gap:10px}
.filter-label{font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:1.5px;font-weight:600}
.fc{padding:9px 20px;border-radius:100px;background:transparent;border:1px solid var(--border-light);font-family:'Inter',sans-serif;font-size:13px;font-weight:500;color:var(--text-muted);cursor:pointer;transition:all .25s cubic-bezier(.16,1,.3,1)}
.fc:hover{border-color:rgba(255,255,255,.15);color:var(--text-sec);background:rgba(255,255,255,.02)}
.fc.on{background:var(--accent-dim);border-color:var(--border-accent);color:var(--accent);box-shadow:0 0 20px rgba(6,214,160,.06)}
.fc .cn{display:inline-block;margin-left:8px;padding:2px 8px;border-radius:100px;background:rgba(255,255,255,.05);font-size:11px;font-weight:600}
.fc.on .cn{background:rgba(6,214,160,.12)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:18px;padding-bottom:3rem}
.card{background:var(--bg-card);border:1px solid var(--border-subtle);border-radius:18px;padding:24px 26px;position:relative;overflow:hidden;transition:all .35s cubic-bezier(.16,1,.3,1);animation:cardReveal .5s cubic-bezier(.16,1,.3,1) both}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;border-radius:18px 18px 0 0}
.card::after{content:'';position:absolute;inset:0;border-radius:18px;opacity:0;transition:opacity .35s;pointer-events:none}
.card:hover{border-color:var(--border-light);transform:translateY(-3px);box-shadow:0 12px 40px rgba(0,0,0,.3)}.card:hover::after{opacity:1}
.card.v-enthusiasm::before{background:linear-gradient(90deg,var(--v-enth),rgba(244,63,94,.3))}.card.v-enthusiasm::after{background:var(--v-enth-glow)}
.card.v-excellence::before{background:linear-gradient(90deg,var(--v-exc),rgba(59,130,246,.3))}.card.v-excellence::after{background:var(--v-exc-glow)}
.card.v-teamspirit::before{background:linear-gradient(90deg,var(--v-ts),rgba(6,214,160,.3))}.card.v-teamspirit::after{background:var(--v-ts-glow)}
.card.v-integrity::before{background:linear-gradient(90deg,var(--v-int),rgba(167,139,250,.3))}.card.v-integrity::after{background:var(--v-int-glow)}
.card.v-entrepreneurship::before{background:linear-gradient(90deg,var(--v-ent),rgba(240,180,41,.3))}.card.v-entrepreneurship::after{background:var(--v-ent-glow)}
.card.v-responsibility::before{background:linear-gradient(90deg,var(--v-res),rgba(236,72,153,.3))}.card.v-responsibility::after{background:var(--v-res-glow)}
.ch{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;position:relative;z-index:1}
.ca{display:flex;align-items:center;gap:12px}
.cav{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-family:'Sora',sans-serif;font-size:14px;font-weight:700}
.cn-name{font-weight:600;font-size:14px;color:var(--text-bright)}.cn-loc{font-size:12px;color:var(--text-muted);margin-top:1px;font-weight:500}
.vb{padding:5px 14px;border-radius:100px;font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;border:1px solid}
.vb.enthusiasm{background:var(--v-enth-bg);color:var(--v-enth);border-color:rgba(244,63,94,.15)}
.vb.excellence{background:var(--v-exc-bg);color:var(--v-exc);border-color:rgba(59,130,246,.15)}
.vb.teamspirit{background:var(--v-ts-bg);color:var(--v-ts);border-color:rgba(6,214,160,.15)}
.vb.integrity{background:var(--v-int-bg);color:var(--v-int);border-color:rgba(167,139,250,.15)}
.vb.entrepreneurship{background:var(--v-ent-bg);color:var(--v-ent);border-color:rgba(240,180,41,.15)}
.vb.responsibility{background:var(--v-res-bg);color:var(--v-res);border-color:rgba(236,72,153,.15)}
.av-enthusiasm{background:var(--v-enth-bg);color:var(--v-enth)}.av-excellence{background:var(--v-exc-bg);color:var(--v-exc)}.av-teamspirit{background:var(--v-ts-bg);color:var(--v-ts)}.av-integrity{background:var(--v-int-bg);color:var(--v-int)}.av-entrepreneurship{background:var(--v-ent-bg);color:var(--v-ent)}.av-responsibility{background:var(--v-res-bg);color:var(--v-res)}
.cb{font-size:14px;line-height:1.7;color:var(--text-sec);margin-bottom:18px;position:relative;z-index:1}
.cf{display:flex;align-items:center;justify-content:space-between;position:relative;z-index:1}
.cg{font-size:11px;color:var(--text-muted);font-weight:500}.cs{display:flex;gap:3px}
.s-on{color:var(--accent-gold);font-size:14px}.s-off{color:var(--text-muted);opacity:.25;font-size:14px}
.empty{text-align:center;padding:100px 20px;color:var(--text-muted);font-size:15px}.empty-i{font-size:56px;margin-bottom:20px;opacity:.2}
.foot{text-align:center;padding:2.5rem 0 2rem;border-top:1px solid var(--border-subtle)}
.foot-t{font-size:12px;color:var(--text-muted);letter-spacing:1px}.foot-b{color:var(--text-sec);font-weight:600}
.foot-l{display:inline-block;width:40px;height:1px;background:var(--border-light);vertical-align:middle;margin:0 16px}

/* === LEADERBOARD === */
.lb{display:none;padding-bottom:3rem}
.lb-section{margin-bottom:2.5rem}
.lb-title{font-family:'Sora',sans-serif;font-size:16px;font-weight:600;color:var(--text-bright);margin-bottom:16px;letter-spacing:-.2px}
.lb-row{display:flex;align-items:center;gap:16px;padding:14px 20px;background:var(--bg-card);border:1px solid var(--border-subtle);border-radius:14px;margin-bottom:8px;transition:all .3s;animation:cardReveal .4s cubic-bezier(.16,1,.3,1) both}
.lb-row:hover{border-color:var(--border-light);background:rgba(15,22,48,.8)}
.lb-rank{font-family:'Sora',sans-serif;font-size:20px;font-weight:700;color:var(--text-muted);width:36px;text-align:center;flex-shrink:0}
.lb-row:nth-child(2) .lb-rank{color:var(--accent-gold);font-size:24px}
.lb-row:nth-child(3) .lb-rank{color:var(--text-sec)}
.lb-row:nth-child(4) .lb-rank{color:rgba(205,127,50,0.8)}
.lb-info{flex:1;min-width:0}
.lb-name{font-weight:600;font-size:14px;color:var(--text-bright)}
.lb-meta{font-size:12px;color:var(--text-muted);margin-top:2px}
.lb-bar-wrap{flex:1;max-width:300px;height:8px;background:rgba(255,255,255,.03);border-radius:100px;overflow:hidden}
.lb-bar{height:100%;border-radius:100px;animation:barGrow .6s cubic-bezier(.16,1,.3,1) both}
.lb-bar.gold{background:linear-gradient(90deg,var(--accent-gold),rgba(240,180,41,.5))}
.lb-bar.cyan{background:linear-gradient(90deg,var(--accent),rgba(6,214,160,.5))}
.lb-count{font-family:'Sora',sans-serif;font-size:18px;font-weight:700;color:var(--text-bright);min-width:40px;text-align:right}
.lb-count-label{font-size:11px;color:var(--text-muted);font-weight:500}
.lb-avg{font-size:13px;color:var(--accent-gold);margin-left:12px;font-weight:600}

/* Medal icons */
.medal{font-size:22px;width:36px;text-align:center;flex-shrink:0}

@media(max-width:900px){.main{padding:0 1.5rem}.hdr{flex-direction:column;align-items:flex-start;gap:20px}.hdr-r{width:100%;flex-wrap:wrap}.stats{grid-template-columns:repeat(2,1fr)}.grid{grid-template-columns:1fr}.lb-bar-wrap{max-width:150px}}
@media(max-width:480px){.stats{grid-template-columns:1fr}.logos{gap:12px}.lsvg{height:16px}.lb-bar-wrap{display:none}}
</style>
</head>

<div>
<div class="htitle">Best Practice Wall</div>
<div class="hsub">Your flight to culture &amp; performance</div>
</div>
</div>
<div class="hdr-r">
<div class="view-toggle">
<button class="vt-btn on" id="vtWall" onclick="setView('wall')">Wall</button>
<button class="vt-btn" id="vtLB" onclick="setView('lb')">Leaderboard</button>
</div>
<button class="btn-r" onclick="loadData()">&#8635; Refresh</button>
</div>
</div>

<div class="stats">
<div class="st"><div class="st-n" id="sE">0</div><div class="st-l">Best practices</div></div>
<div class="st"><div class="st-n" id="sA">&mdash;</div><div class="st-l">Avg. impact</div></div>
<div class="st"><div class="st-n" id="sP">0</div><div class="st-l">Contributors</div></div>
<div class="st"><div class="st-n" id="sS">0</div><div class="st-l">Sites</div></div>
</div>

<div class="filters-area">
<div class="frow" id="gFilters"></div>
<div class="frow" id="vFilters"></div>
</div>

<!-- WALL VIEW -->
<div id="wallView">
<div class="grid" id="grid"></div>
<div class="empty" id="empty" style="display:none"><div class="empty-i">&#9992;</div><div>Waiting for flight log entries&hellip;</div><div style="margin-top:8px;font-size:13px;color:var(--text-muted)">Click <strong style="color:var(--text-sec)">Refresh</strong> once participants have submitted.</div></div>
</div>

<!-- LEADERBOARD VIEW -->
<div class="lb" id="lbView">
<div class="lb-section">
<div class="lb-title">Top contributors</div>
<div id="lbPeople"></div>
</div>
<div class="lb-section">
<div class="lb-title">Session ranking</div>
<div id="lbSessions"></div>
</div>
</div>

<div class="foot"><div class="foot-t"><span class="foot-b">RECARO Aircraft Seating</span><span class="foot-l"></span><span class="foot-b">Jenewein AG</span><span class="foot-l"></span><span>Values4Success 2026</span></div></div>
</div>

<script>
var CSV_URL='https://docs.google.com/spreadsheets/d/e/2PACX-1vT6bLqhDQQad8PVxt6NqMGhJr3B32H90JfguibaTCoYebcaT407w8sPJHQu1YQrTGcUuqq9eB0y9UdI/pub?output=csv';
var V2_MODE=false;
var VM={'enthusiasm':'Enthusiasm','excellence':'Excellence','team spirit':'Team Spirit','teamspirit':'Team Spirit','integrity':'Integrity','entrepreneurship':'Entrepreneurship','responsibility':'Responsibility'};
var VK={'Enthusiasm':'enthusiasm','Excellence':'excellence','Team Spirit':'teamspirit','Integrity':'integrity','Entrepreneurship':'entrepreneurship','Responsibility':'responsibility'};
var entries=[],fGroup='all',fValue='all',currentView='wall';

function setView(v){
  currentView=v;
  document.getElementById('vtWall').classList.toggle('on',v==='wall');
  document.getElementById('vtLB').classList.toggle('on',v==='lb');
  document.getElementById('wallView').style.display=v==='wall'?'block':'none';
  document.getElementById('lbView').style.display=v==='lb'?'block':'none';
  if(v==='lb')renderLeaderboard();
}

function loadData(){
  var btn=document.querySelector('.btn-r');btn.textContent='\u21BB Loading\u2026';
  fetch(CSV_URL,{redirect:'follow'}).then(function(r){
    if(!r.ok)throw new Error('HTTP '+r.status);return r.text()
  }).then(function(csv){
    if(csv.indexOf('<!DOCTYPE')!==-1||csv.indexOf('<html')!==-1)throw new Error('Got HTML instead of CSV');
    entries=parseCSV(csv);render();btn.textContent='\u21BB Refresh';
  }).catch(function(e){
    console.error('Fetch failed:',e);btn.textContent='\u21BB Refresh';
    var em=document.getElementById('empty');em.style.display='block';document.getElementById('grid').style.display='none';
    em.innerHTML='<div class="empty-i">&#9888;</div><div>Could not load data.</div><div style="margin-top:12px;font-size:13px;color:var(--text-muted);max-width:480px;margin-left:auto;margin-right:auto;line-height:1.6">If you opened this file locally, host it on GitHub Pages or a web server.</div>';
  })
}

function parseCSV(csv){
  var lines=csv.split('\n');if(lines.length<2)return[];var res=[];
  for(var i=1;i<lines.length;i++){
    var c=parseLine(lines[i]);
    if(V2_MODE){if(c.length<6)continue;var name=c[1].trim(),loc=c[2].trim(),prac=c[3].trim(),val=c[4].trim(),rat=parseInt(c[5].trim())||3;var grp=''}
    else{if(c.length<7)continue;var grp=c[1].trim(),name=c[2].trim(),loc=c[3].trim(),prac=c[4].trim(),val=c[5].trim(),rat=parseInt(c[6].trim())||3}
    var nv=val,lv=val.toLowerCase().replace(/\s+/g,' ');
    for(var k in VM){if(lv.indexOf(k)!==-1){nv=VM[k];break}}
    if(prac)res.push({grp:grp,name:name,loc:loc,val:nv,txt:prac,r:Math.min(5,Math.max(1,rat))});
  }
  return res;
}
function parseLine(l){var r=[],c='',q=false;for(var i=0;i<l.length;i++){var ch=l[i];if(q){if(ch==='"'&&l[i+1]==='"'){c+='"';i++}else if(ch==='"'){q=false}else{c+=ch}}else{if(ch==='"'){q=true}else if(ch===','){r.push(c);c=''}else{c+=ch}}}r.push(c);return r}

function filtered(){return entries.filter(function(e){return(fGroup==='all'||e.grp===fGroup)&&(fValue==='all'||e.val===fValue)})}
function initials(n){var p=n.trim().split(/\s+/);return p.length>1?(p[0][0]+p[p.length-1][0]).toUpperCase():n.substring(0,2).toUpperCase()}
function vkey(v){return VK[v]||v.toLowerCase().replace(/\s+/g,'')}

function render(){renderGroupFilters();renderValueFilters();renderGrid();renderStats();if(currentView==='lb')renderLeaderboard()}

function renderGroupFilters(){
  var gc={};entries.forEach(function(e){if(e.grp)gc[e.grp]=(gc[e.grp]||0)+1});
  var f=document.getElementById('gFilters');f.innerHTML='';
  var groups=Object.keys(gc).sort();
  if(groups.length===0)return;
  var lbl=document.createElement('span');lbl.className='filter-label';lbl.textContent='Session';f.appendChild(lbl);
  var a=document.createElement('button');a.className='fc'+(fGroup==='all'?' on':'');a.innerHTML='All sessions <span class="cn">'+entries.length+'</span>';a.onclick=function(){fGroup='all';render()};f.appendChild(a);
  groups.forEach(function(g){var b=document.createElement('button');b.className='fc'+(fGroup===g?' on':'');b.innerHTML=g+' <span class="cn">'+gc[g]+'</span>';b.onclick=function(){fGroup=g;render()};f.appendChild(b)});
}

function renderValueFilters(){
  var fl=entries.filter(function(e){return fGroup==='all'||e.grp===fGroup});
  var vc={};fl.forEach(function(e){vc[e.val]=(vc[e.val]||0)+1});
  var f=document.getElementById('vFilters');f.innerHTML='';
  var lbl=document.createElement('span');lbl.className='filter-label';lbl.textContent='Value';f.appendChild(lbl);
  var a=document.createElement('button');a.className='fc'+(fValue==='all'?' on':'');a.innerHTML='All values <span class="cn">'+fl.length+'</span>';a.onclick=function(){fValue='all';render()};f.appendChild(a);
  ['Enthusiasm','Excellence','Team Spirit','Integrity','Entrepreneurship','Responsibility'].forEach(function(v){
    if(!vc[v])return;var b=document.createElement('button');b.className='fc'+(fValue===v?' on':'');b.innerHTML=v+' <span class="cn">'+vc[v]+'</span>';b.onclick=function(){fValue=v;render()};f.appendChild(b);
  });
}

function renderGrid(){
  var g=document.getElementById('grid'),em=document.getElementById('empty');g.innerHTML='';
  var fl=filtered();
  if(!fl.length){em.style.display='block';g.style.display='none';return}
  em.style.display='none';g.style.display='grid';
  fl.forEach(function(e,idx){
    var k=vkey(e.val),card=document.createElement('div');card.className='card v-'+k;card.style.animationDelay=(idx*.05)+'s';
    var stars='';for(var i=0;i<5;i++)stars+='<span class="'+(i<e.r?'s-on':'s-off')+'">\u2605</span>';
    var grpHtml=e.grp?'<span class="cg">'+esc(e.grp)+'</span>':'';
    card.innerHTML='<div class="ch"><div class="ca"><div class="cav av-'+k+'">'+initials(e.name)+'</div><div><div class="cn-name">'+esc(e.name)+'</div><div class="cn-loc">'+esc(e.loc)+'</div></div></div><span class="vb '+k+'">'+esc(e.val)+'</span></div><div class="cb">'+esc(e.txt)+'</div><div class="cf">'+grpHtml+'<div class="cs">'+stars+'</div></div>';
    g.appendChild(card);
  });
}

function renderStats(){
  var fl=filtered();
  document.getElementById('sE').textContent=fl.length;
  if(fl.length){var s=0;fl.forEach(function(e){s+=e.r});document.getElementById('sA').textContent=(s/fl.length).toFixed(1)}else{document.getElementById('sA').textContent='\u2014'}
  var p={},si={};fl.forEach(function(e){p[e.name+'|||'+e.loc]=1;if(e.loc)si[e.loc]=1});
  document.getElementById('sP').textContent=Object.keys(p).length;
  document.getElementById('sS').textContent=Object.keys(si).length;
}

function renderLeaderboard(){
  var fl=filtered();
  renderPeopleRanking(fl);
  renderSessionRanking(fl);
}

function renderPeopleRanking(fl){
  var people={};
  fl.forEach(function(e){
    var key=e.name+'|||'+e.loc;
    if(!people[key])people[key]={name:e.name,loc:e.loc,count:0,totalR:0};
    people[key].count++;
    people[key].totalR+=e.r;
  });
  var sorted=Object.values(people).sort(function(a,b){return b.count-a.count||b.totalR-a.totalR});
  var maxCount=sorted.length?sorted[0].count:1;
  var el=document.getElementById('lbPeople');el.innerHTML='';
  var medals=['','&#9733;','&#9733;','&#9733;'];
  sorted.forEach(function(p,idx){
    var pct=Math.round((p.count/maxCount)*100);
    var avg=(p.totalR/p.count).toFixed(1);
    var rankHtml;
    if(idx===0)rankHtml='<div class="medal" style="color:var(--accent-gold)">&#9733;</div>';
    else if(idx===1)rankHtml='<div class="medal" style="color:var(--text-sec)">&#9733;</div>';
    else if(idx===2)rankHtml='<div class="medal" style="color:rgba(205,127,50,0.8)">&#9733;</div>';
    else rankHtml='<div class="lb-rank">'+(idx+1)+'</div>';
    var row=document.createElement('div');row.className='lb-row';row.style.animationDelay=(idx*.04)+'s';
    row.innerHTML=rankHtml+'<div class="lb-info"><div class="lb-name">'+esc(p.name)+'</div><div class="lb-meta">'+esc(p.loc)+'</div></div><div class="lb-bar-wrap"><div class="lb-bar gold" style="--bar-w:'+pct+'%;width:'+pct+'%"></div></div><div style="text-align:right"><div class="lb-count">'+p.count+'</div><div class="lb-count-label">entries</div></div><div class="lb-avg">'+avg+' &#9733;</div>';
    el.appendChild(row);
  });
  if(!sorted.length)el.innerHTML='<div style="color:var(--text-muted);font-size:14px;padding:20px">No entries yet.</div>';
}

function renderSessionRanking(fl){
  var sessions={};
  // Use ALL entries (not filtered by value) for session ranking, but respect group filter
  var sessionData=entries.filter(function(e){return fGroup==='all'||e.grp===fGroup});
  sessionData.forEach(function(e){
    if(!e.grp)return;
    if(!sessions[e.grp])sessions[e.grp]={grp:e.grp,count:0,totalR:0};
    sessions[e.grp].count++;
    sessions[e.grp].totalR+=e.r;
  });
  var sorted=Object.values(sessions).sort(function(a,b){return b.count-a.count||b.totalR-a.totalR});
  var maxCount=sorted.length?sorted[0].count:1;
  var el=document.getElementById('lbSessions');el.innerHTML='';
  sorted.forEach(function(s,idx){
    var pct=Math.round((s.count/maxCount)*100);
    var avg=s.count?(s.totalR/s.count).toFixed(1):'0';
    var rankHtml;
    if(idx===0)rankHtml='<div class="medal" style="color:var(--accent-gold)">&#9733;</div>';
    else if(idx===1)rankHtml='<div class="medal" style="color:var(--text-sec)">&#9733;</div>';
    else if(idx===2)rankHtml='<div class="medal" style="color:rgba(205,127,50,0.8)">&#9733;</div>';
    else rankHtml='<div class="lb-rank">'+(idx+1)+'</div>';
    var row=document.createElement('div');row.className='lb-row';row.style.animationDelay=(idx*.04)+'s';
    row.innerHTML=rankHtml+'<div class="lb-info"><div class="lb-name">'+esc(s.grp)+'</div><div class="lb-meta">'+s.count+' entries</div></div><div class="lb-bar-wrap"><div class="lb-bar cyan" style="--bar-w:'+pct+'%;width:'+pct+'%"></div></div><div style="text-align:right"><div class="lb-count">'+avg+'</div><div class="lb-count-label">avg. impact</div></div>';
    el.appendChild(row);
  });
  if(!sorted.length)el.innerHTML='<div style="color:var(--text-muted);font-size:14px;padding:20px">No session data yet.</div>';
}

function esc(s){var d=document.createElement('div');d.textContent=s||'';return d.innerHTML}

loadData();
</script>
</body>
